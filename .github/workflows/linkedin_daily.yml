name: Awork LinkedIn Private Draft
on:
  schedule:
    - cron: '30 4 * * *' # Ye exact 9:30 AM IST hai
  workflow_dispatch: # Taaki tum jab chaho manually bhi button daba kar check kar sako

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pyrogram tgcrypto google-generativeai pillow

      - name: Run LinkedIn Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_BOT_TOKEN: ${{ secrets.LINKEDIN_BOT_TOKEN }}
          PRIVATE_CHAT_ID: ${{ secrets.PRIVATE_CHAT_ID }}
        run: python linkedin_poster.py
