name: Awork LinkedIn Private Draft

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyrogram tgcrypto groq pillow

      - name: Run LinkedIn Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_BOT_TOKEN: ${{ secrets.LINKEDIN_BOT_TOKEN }}
          PRIVATE_CHAT_ID: ${{ secrets.PRIVATE_CHAT_ID }}
        run: python linkedin_poster.py
