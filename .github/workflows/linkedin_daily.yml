name: Awork LinkedIn Private Draft
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyrogram tgcrypto google-genai pillow

      - name: Run LinkedIn Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_BOT_TOKEN: ${{ secrets.LINKEDIN_BOT_TOKEN }}
          PRIVATE_CHAT_ID: ${{ secrets.PRIVATE_CHAT_ID }}
        run: python linkedin_poster.py
